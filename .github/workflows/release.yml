name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Rust binaries (relay + host) ──────────────────────────────────
  build-host:
    name: Host (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,   artifact: openssh-host-linux-x64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,        artifact: openssh-host-macos-x64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,       artifact: openssh-host-macos-arm64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     artifact: openssh-host-windows-x64.exe }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p host --target ${{ matrix.target }}
      - name: Rename (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/host ${{ matrix.artifact }}
      - name: Rename (Win)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\host.exe ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with: { name: "${{ matrix.artifact }}", path: "${{ matrix.artifact }}" }

  build-relay:
    name: Relay (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,   artifact: openssh-relay-linux-x64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,        artifact: openssh-relay-macos-x64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,       artifact: openssh-relay-macos-arm64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     artifact: openssh-relay-windows-x64.exe }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p relay --target ${{ matrix.target }}
      - name: Rename (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/relay ${{ matrix.artifact }}
      - name: Rename (Win)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\relay.exe ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with: { name: "${{ matrix.artifact }}", path: "${{ matrix.artifact }}" }

  # ── Electron desktop app ──────────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install deps
        run: npm install
        working-directory: desktop
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux
        working-directory: desktop
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: npm run build:mac
        working-directory: desktop
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        working-directory: desktop
      - name: Upload desktop dist
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.dmg
            desktop/dist/*.exe
            desktop/dist/*.msi

  # ── GitHub Release ────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-host, build-relay, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: ./dist }
      - uses: softprops/action-gh-release@v2
        with:
          name: OpenSSH ${{ github.ref_name }}
          body: |
            ## OpenSSH ${{ github.ref_name }}

            ### 🖥️ Desktop App
            | Platform | Download |
            |---|---|
            | Linux | `.AppImage` or `.deb` in assets below |
            | macOS | `.dmg` in assets below |
            | Windows | `.exe` installer in assets below |

            ### ⌨️ CLI (relay + host daemon)
            | Platform | Host | Relay |
            |---|---|---|
            | Linux x64 | `openssh-host-linux-x64` | `openssh-relay-linux-x64` |
            | macOS x64 | `openssh-host-macos-x64` | `openssh-relay-macos-x64` |
            | macOS ARM | `openssh-host-macos-arm64` | `openssh-relay-macos-arm64` |
            | Windows x64 | `openssh-host-windows-x64.exe` | `openssh-relay-windows-x64.exe` |

            See the [README](https://github.com/AmritRai1234/Openssh#readme) for setup instructions.
          files: dist/**/*

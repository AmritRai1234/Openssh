services:
  relay:
    build: .
    restart: unless-stopped
    ports:
      - "9090:8080" # HTTP API (app connects here)
      - "2222:2222" # SSH relay (host daemons connect here)
    volumes:
      - relay-data:/data
    environment:
      # Set this to your public domain/IP so QR codes work from outside
      PUBLIC_URL: ${PUBLIC_URL:-}
    healthcheck:
      test: [ "CMD", "curl", "-sf", "-o", "/dev/null", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{}", "http://localhost:8080/api/register" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  relay-data:

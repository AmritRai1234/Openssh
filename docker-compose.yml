services:
  relay:
    build: .
    restart: unless-stopped
    ports:
      - "9090:8080"
      - "2222:2222"
    volumes:
      - relay-data:/data
    environment:
      PUBLIC_URL: https://openssh.ca
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  relay-data:

services:
  relay:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "2222:2222" # SSH relay (host daemons connect here)
    volumes:
      - relay-data:/data
    environment:
      PUBLIC_URL: https://openssh.ca
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - relay

volumes:
  relay-data:
  caddy-data:
  caddy-config:
